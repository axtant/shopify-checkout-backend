name: Build & Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/shopify-checkout-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & Push Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Write Firebase credentials to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            mkdir -p /home/cs2/shopify-checkout-config
            echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /home/cs2/shopify-checkout-config/firebase-service-account.json

      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/axtant/shopify-checkout-backend:latest
            docker logout ghcr.io
            docker stop checkout-backend || true
            docker rm checkout-backend || true
            mkdir -p /home/cs2/shopify-checkout-logs
            docker run -d \
              --name checkout-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /home/cs2/shopify-checkout-config:/app/config \
              -v /home/cs2/shopify-checkout-logs:/app/logs \
              -v /home/cs2/shopify-checkout-config/firebase-service-account.json:/app/firebase-service-account.json \
              -e SPRING_CONFIG_ADDITIONAL_LOCATION=file:/app/config/ \
              ghcr.io/axtant/shopify-checkout-backend:latest
